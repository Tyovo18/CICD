name: CI/CD Pipeline

on:
  pull_request:
    branches: [ dev ]  # Déclenché sur les PR vers dev
  push:
    branches: [ dev ]  # Optionnel : aussi sur les push directs vers dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check TypeScript
        run: npm run ts
      
      - name: Lint
        run: npm run lint:check
      
      - name: Run unit tests
        run: npm test

  performance-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Install k6
        run: |
          curl -s https://dl.k6.io/key.gpg | sudo apt-key add -
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      
      - name: Run load tests
        run: k6 run tests/k6/load-test.js || true  

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, performance-test]
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/mon-api-express
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=staging-latest
            type=raw,value=dev-${{ github.sha }}
      
      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/mon-api-express:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/mon-api-express:buildcache,mode=max
      
      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    steps:
      - name: Trigger staging deployment webhook
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "image": "${{ secrets.DOCKER_USERNAME }}/mon-api-express:dev-${{ github.sha }}",
              "environment": "staging",
              "commit": "${{ github.sha }}",
              "branch": "${{ github.ref_name }}"
            }' \
            ${{ secrets.STAGING_WEBHOOK_URL }}
      
      - name: Wait for deployment
        run: sleep 10
      
      - name: Verify deployment
        run: |
          # Optionnel : Vérifier que le déploiement est réussi
          curl -f -I https://staging.mon-app.com || echo "Deployment verification pending"

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: always()
    steps:
      - name: Send notification
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "Déploiement staging réussi !"
          else
            echo "Échec du déploiement staging"
          fi